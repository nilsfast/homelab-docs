entities:
    service:
        icon: server
        fields:
            name: { type: string, required: true }
            url: { type: url }
            status:
                {
                    type: enum,
                    options:
                        [
                            phase-in,
                            active,
                            inactive,
                            deprecated,
                            planned,
                            phase-out,
                        ],
                }
            host: { type: relation, target: host }
            notes: { type: markdown }
            tags: { type: tags }
        list_columns: [name, status, url, host]

    host:
        icon: hard-drive
        fields:
            name: { type: string, required: true }
            ip: { type: string }
            os: { type: string }
            ram_gb: { type: number }
            role:
                { type: enum, options: [hypervisor, bare-metal, vm, container] }
            location: { type: relation, target: location }
        list_columns: [name, ip, os, role]

    backup_link:
        icon: link
        label: Backup Link
        fields:
            source_service:
                {
                    type: relation,
                    target: service,
                    required: true,
                    related_name: "Backups To",
                }
            destination_host:
                {
                    type: relation,
                    target: host,
                    required: true,
                    related_name: "Backups From",
                }
            frequency: { type: string }
            notes: { type: markdown }

        list_columns: [source_service, destination_host, frequency]
        junction:
            left: service
            right: host

    credential:
        icon: key
        fields:
            name: { type: string, required: true }
            storage_location: { type: string }
            associated_service: { type: relation, target: service }
        list_columns: [name, storage_location, associated_service]

    personal_device:
        icon: laptop
        fields:
            name: { type: string, required: true }
            type: { type: enum, options: [laptop, desktop, mobile] }
            owner: { type: string }
            os: { type: string }
        list_columns: [name, type, owner]

    location:
        icon: map-pin
        fields:
            name: { type: string, required: true }
            address: { type: string }
            notes: { type: markdown }
        list_columns: [name, address]

    domain:
        icon: globe
        fields:
            name: { type: string, required: true }
            registrar: { type: string }
            expiration_date: { type: date }
            associated_services: { type: relation, target: service }
        list_columns: [name, registrar, expiration_date]

    software:
        icon: code
        plural: Software
        fields:
            name: { type: string, required: true }
            version: { type: string }
            license: { type: string }
            associated_services:
                {
                    type: relation,
                    target: service,
                    related_name: "Uses Software",
                }
        list_columns: [name, version, license]
    network:
        icon: wifi
        fields:
            name: { type: string, required: true }
            subnet: { type: string }
            vlan_id: { type: number }
        list_columns: [name, subnet, vlan_id]

    service_network:
        icon: cable
        label: IP Assignment
        fields:
            service: { type: relation, target: service, required: true }
            network: { type: relation, target: network, required: true }
            ip: { type: string } # the IP this service has on this network
            port: { type: number } # exposed port
            protocol: { type: enum, options: [tcp, udp, both] }
            notes: { type: markdown }
            additional_info: { type: string }

        list_columns:
            [service, network, ip, port, protocol, notes, additional_info]
        junction:
            left: service
            right: network
