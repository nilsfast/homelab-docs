<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}homebase{% endblock %}</title>
        <script src="https://unpkg.com/htmx.org@2.0.10"></script>
        <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
        <link rel="stylesheet" href="/static/style.css" />
        <link rel="preconnect" href="https://rsms.me/" />
        <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
        {% block head %}{% endblock %}
    </head>
    <body>
        <nav class="menubar">
            <div class="menubar-brand">
                <i data-lucide="database"></i>
                <span>homebase</span>
            </div>

            <div class="menubar-search">
                <input
                    type="search"
                    name="q"
                    placeholder="Search everything…"
                    value="{{ q or '' }}"
                    hx-get="/search"
                    hx-target=".main"
                    hx-trigger="input changed delay:300ms, search"
                    hx-push-url="false"
                />
            </div>
        </nav>

        <div class="main-wrapper">
            <aside class="sidebar">
                <a
                    class="nav-item {% if active_entity == ename %}active{% endif %}"
                    href="/graph"
                    hx-get="/graph"
                    hx-target="body"
                    hx-push-url="true"
                    >Graph</a
                >

                <div class="sidebar-section">
                    <span class="sidebar-section-title">Inventory</span>
                    {% for ename, edef in sidebar_entities.items() %}
                    <a
                        class="nav-item {% if active_entity == ename %}active{% endif %}"
                        href="/{{ ename }}"
                        hx-get="/{{ ename }}"
                        hx-target="body"
                        hx-push-url="true"
                    >
                        <i data-lucide="{{ edef.icon }}"></i>
                        <span class="nav-item-name bg-rb-{{ edef.color_id }}"
                            >{{ edef.plural }}</span
                        >
                        <span class="nav-count" id="count-{{ ename }}"
                            >{{ counts.get(ename, 0) }}</span
                        >
                    </a>
                    {% endfor %}
                </div>
            </aside>

            <div class="main" id="main-content">
                {% block content %}
                <div class="page-header">
                    <h1>Dashboard</h1>
                </div>
                <div class="empty">
                    <i data-lucide="layout-dashboard"></i>
                    <p>Select an entity from the sidebar to get started.</p>
                </div>
                {% endblock %}
            </div>
        </div>

        <div id="toast" class="toast"></div>
        <div id="modal-container"></div>

        <script>
            // Re-init Lucide icons after every HTMX swap.
            document.addEventListener("htmx:afterSwap", () =>
                lucide.createIcons()
            );
            document.addEventListener("DOMContentLoaded", () =>
                lucide.createIcons()
            );

            // Keep sidebar active state in sync with HTMX navigation.
            document.addEventListener("htmx:pushedIntoHistory", (e) => {
                document.querySelectorAll(".nav-item").forEach((el) => {
                    el.classList.toggle(
                        "active",
                        el.getAttribute("href") === location.pathname
                    );
                });
            });

            // Toast helper with persistence support.
            function showToast(msg) {
                const t = document.getElementById("toast");
                t.textContent = msg;
                t.classList.add("show");
                setTimeout(() => t.classList.remove("show"), 2000);
            }

            // Persist toast to sessionStorage before redirect.
            function persistToast(msg) {
                sessionStorage.setItem("pendingToast", msg);
            }

            // Show persisted toast on page load.
            window.addEventListener("load", () => {
                const msg = sessionStorage.getItem("pendingToast");
                if (msg) {
                    showToast(msg);
                    sessionStorage.removeItem("pendingToast");
                }
            });

            // Listen for custom toast events from HTMX responses.
            document.addEventListener("htmx:afterRequest", (e) => {
                const trigger = e.detail.xhr?.getResponseHeader("HX-Trigger");
                if (trigger) {
                    try {
                        const data = JSON.parse(trigger);
                        if (data.showToast) {
                            // Check if response indicates redirect
                            if (
                                e.detail.xhr.status === 303 ||
                                e.detail.xhr.status === 302
                            ) {
                                persistToast(data.showToast);
                            } else {
                                showToast(data.showToast);
                            }
                        }
                    } catch (_) {}
                }
            });
        </script>
    </body>
</html>
